<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Week 6 SSR VS CSR</title>

    <meta name="theme-color" content="#317EFB">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="images/star_favorite_5754.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="app-shell-header">
        <h1>Mi Gestor de Tareas</h1>
    </header>

    <!-- CONTENT -->
    <main id="app-content">
        <ul id="task-list">
            <!-- <li>Tarea 1: Aprender conceptos de SSR (Viene en el HTML)</li> -->
            <!-- <li>Tarea 2: Entender el flujo de red (Viene en el HTML)</li> -->
        </ul>
    </main>

    <script src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.warn('Error in SW register', err));
            });
        }
    </script>

</body>
</html>

<!-- APP Shell es el contenido minimo que debe de tener una pagina para ser manejable(en este caso seria este tipo de DOM).-->
<!-- Estatico:  Contenido que no cambia (Aqui es casi el DOM por completo). -->
<!--Dinamico:  Contenido que cambia segun que ususario este usando el software (Podria ser el contenido donde se le inyecta codigo conectado a APIs o bases de datos). -->
