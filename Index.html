<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>MY FIRST PWA - UTR</title>

    <meta name="theme-color" content="#317EFB">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="images/star_favorite_5754.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h1>Progressive Web Application</h1>
    </header>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Acerca</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>

    <!-- CONTENT -->
    <main class="content">
        <p>Welcome to development environment at week 2</p>

        <p>
            Este contenido puede cambiar o crecer sin afectar
            el header, la barra de navegación o el footer.
        </p>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 - UTR | PWA Example</p>
    </footer>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.warn('Error in SW register', err));
            });
        }
    </script>

</body>
</html>

<!-- APP Shell es el contenido minimo que debe de tener una pagina para ser manejable(en este caso seria este tipo de DOM).-->
<!-- Estatico:  Contenido que no cambia (Aqui es casi el DOM por completo). -->
<!--Dinamico:  Contenido que cambia segun que ususario este usando el software (Podria ser el contenido donde se le inyecta codigo conectado a APIs o bases de datos). -->
