<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Inventory Registration System</title>
    <meta name="theme-color" content="#317EFB">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="images/star_favorite_5754.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-shell-header">
        <h1>Registro de Inventario</h1>
        <div id="status-online" class="status online">En línea</div>
    </header>

    <main id="app-content">
        <form id="form-producto">
            <input type="text" id="nombre-producto" placeholder="Nombre del producto" required>
            <input type="number" id="cantidad-producto" placeholder="Cantidad" min="1" required>
            <button type="submit">Guardar Producto</button>
        </form>

        <section>
            <h2>Productos Guardados</h2>
            <ul id="lista-productos"></ul>
        </section>

        <!-- Sección de Cámara -->
        <section>
            <h2>Tomar Foto</h2>
            <video id="videoElement" autoplay style="width: 100%; max-width: 400px; border: 1px solid #ccc;"></video>
            <div style="text-align: center; margin: 10px 0;">
                <button id="takeSnap">Tomar Foto</button>
            </div>
            <canvas id="canvasEl" style="display: none;"></canvas>
        </section>
    </main>
    
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
